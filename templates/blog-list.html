<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      (function(){var l=localStorage.getItem('site-lang')||((navigator.language||'fr').toLowerCase().startsWith('fr')?'fr':'en');document.documentElement.lang=l;})();

<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-container">
                <a href="{{root}}index.html" class="nav-logo" data-i18n="nav.logo_home">Portfolio</a>
                <button class="nav-toggle" id="nav-toggle" data-i18n-aria="nav.menu" aria-label="Menu">
                    <span class="nav-toggle-line"></span>
                    <span class="nav-toggle-line"></span>

                </button>
                <ul class="nav-menu" id="nav-menu">

                    <li class="nav-item"><a href="index.html" class="nav-link active" data-i18n="nav.blog">Blog</a></li>

                </ul>
            </div>
        </nav>
    </header>

    <main class="main blog-main">
        <section class="blog-hero container">
            <h1 class="blog-hero-title" data-i18n="blog.title">Blog</h1>
            <p class="blog-hero-subtitle" data-i18n="blog.subtitle">Technical articles and interactive visualizations.</p>
        </section>

        <section class="container blog-list-section">

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p data-i18n="footer.copyright">&copy; 2025 Portfolio. All rights reserved.</p>
                <div class="footer-links">
                    <a href="mailto:henri.hoyez@isen.yncrea.fr" data-i18n="footer.contact">Contact me</a>
                    <a href="https://www.linkedin.com/in/henri-hoyez-9b4297171/" target="_blank" rel="noopener">LinkedIn</a>
